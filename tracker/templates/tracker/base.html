<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background-color: #f8f9fa; }
    .navbar { background-color: #1a1a2e; }
    .card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .badge-income { background-color: #d4edda; color: #155724; padding: 4px 10px; border-radius: 20px; }
    .badge-expense { background-color: #f8d7da; color: #721c24; padding: 4px 10px; border-radius: 20px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3 mb-4">
  <span class="navbar-brand fw-bold fs-5">Finance Tracker</span>
  <div>
    <span class="text-white me-3">Hi, {{ request.user.username }}</span>
    <a href="/accounts/logout/" class="btn btn-outline-light btn-sm">Logout</a>
  </div>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
